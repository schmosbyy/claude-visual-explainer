<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="data:," /><!-- inline empty favicon: suppresses the /favicon.ico request; data: URI, not a network dependency -->
<title>{{TITLE}}</title>
<style>
  :root{
    --bg:#0b0f1a; --panel:#121829; --panel-2:#18203a; --ink:#e8edf7; --muted:#94a3c4;
    --line:#243154; --accent:#6ea8fe; --accent-2:#b694ff; --hot:#ff6b9d; --warm:#ffd166;
    --cool:#4dd4c4; --shadow:0 10px 40px rgba(0,0,0,.45); --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);line-height:1.55;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(110,168,254,.14), transparent 60%),
      radial-gradient(1000px 500px at -10% 10%, rgba(182,148,255,.12), transparent 55%),
      var(--bg);}
  .wrap{max-width:1080px;margin:0 auto;padding:56px 24px 120px}
  .hero{text-align:center;margin-bottom:48px}
  .badge{display:inline-block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--line);padding:6px 14px;border-radius:999px;
    background:rgba(110,168,254,.08);margin-bottom:18px}
  h1{font-size:clamp(30px,5vw,52px);line-height:1.05;margin:0 0 14px;letter-spacing:-.02em;
    background:linear-gradient(120deg,#fff 10%,var(--accent) 55%,var(--accent-2) 95%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:18px;max-width:680px;margin:0 auto}
  section{margin:56px 0}
  .step-tag{display:inline-flex;align-items:center;gap:10px;font-weight:700;color:var(--accent-2);
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
  .step-tag .num{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0b0f1a;font-size:13px}
  h2{font-size:clamp(22px,3.4vw,32px);margin:0 0 10px;letter-spacing:-.01em}
  .lede{color:var(--muted);font-size:16.5px;max-width:760px;margin:0 0 22px}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
  .insight{border-left:3px solid var(--accent);background:rgba(110,168,254,.06);
    border-radius:0 12px 12px 0;padding:14px 18px;margin:18px 0;color:var(--muted);font-size:14px}
  .insight b{color:var(--ink)}
  code.inline{font-family:ui-monospace,Menlo,monospace;background:rgba(255,255,255,.06);
    padding:2px 6px;border-radius:5px;font-size:13px}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:60px}
  html{scroll-behavior:smooth}
  .layout{display:grid;grid-template-columns:190px minmax(0,1fr);gap:46px;align-items:start}
  .toc{position:sticky;top:24px;align-self:start}
  .toc .toc-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .toc a{display:block;color:var(--muted);text-decoration:none;font-size:13.5px;line-height:1.4;
    padding:5px 0 5px 14px;border-left:2px solid var(--line);transition:color .15s,border-color .15s}
  .toc a:hover{color:var(--ink)}
  .toc a.active{color:var(--accent);border-left-color:var(--accent)}
  section{scroll-margin-top:24px}
  .toc-toggle{display:none;cursor:pointer;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:14px;margin-bottom:18px}
  @media (max-width:860px){
    .layout{grid-template-columns:1fr;gap:0}
    .toc{position:static;display:none;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:24px}
    .toc.open{display:block}
    .toc-toggle{display:inline-block}
  }
  .tldr{max-width:760px;margin:0 auto 26px;background:rgba(110,168,254,.08);
    border:1px solid var(--line);border-radius:14px;padding:16px 20px}
  .tldr-tag{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);font-weight:700}
  .tldr p{margin:6px 0 0;font-size:16px;color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="badge">Interactive Visual Explainer</div>
    <h1>{{TITLE}}</h1>
    <p class="sub">{{SUBTITLE}}</p>
  </header>

  <div class="tldr"><span class="tldr-tag">TL;DR</span><p>{{TLDR}}</p></div>
  <button type="button" class="toc-toggle" aria-expanded="false">☰ Contents</button>
  <div class="layout">
    <nav class="toc" aria-label="Contents">
      <div class="toc-h">Contents</div>
      <!-- ToC links are auto-injected by the script below; do not hand-edit. -->
    </nav>
    <main>
      <!-- SECTIONS: the workflow inserts one <section> per concept here.
           Section skeleton:
           <section>
             <div class="step-tag"><span class="num">1</span> Short label</div>
             <h2>Heading</h2>
             <p class="lede">One or two sentences of plain-language framing.</p>
             <div class="panel"> ...prose and/or a widget from reference.md... </div>
             <div class="insight"><b>Insight:</b> a non-obvious point specific to this topic.</div>
           </section>
      -->

      <footer>Self-contained interactive explainer &mdash; generated by the visual-explainer skill.</footer>
    </main>
  </div>
</div>
<!-- WIDGET SCRIPTS: paste each widget's <script> here as its OWN separate block — one <script>
     per widget, never merged with another widget or with the ToC script below. Wrap each
     widget's body in try{…}catch(e){console.error(e)} so one widget's error can't blank the
     others or the table of contents. (See reference.md "Robustness contract".) -->
<script>
/* Scroll-spy ToC — auto-built from sections, dependency-free, file://-safe.
   Authors just add <section>s with an <h2>; the ToC follows.
   Keep this as its OWN <script>, separate from the widget scripts above, so a widget
   error can never disable navigation. */
(function(){
  var main=document.querySelector('main');
  var secs=[].slice.call(main.querySelectorAll('section'));
  var nav=document.querySelector('.toc');
  var btn=document.querySelector('.toc-toggle');
  if(secs.length<3){                                  // short explainers: no ToC
    nav.style.display='none'; btn.style.display='none';
    document.querySelector('.layout').style.gridTemplateColumns='minmax(0,1fr)';
    return;
  }
  var links=secs.map(function(s,i){
    if(!s.id) s.id='sec-'+(i+1);
    var h=s.querySelector('h2');
    var a=document.createElement('a');
    a.href='#'+s.id;
    a.textContent=(h?h.textContent:'Section '+(i+1)).trim();
    nav.appendChild(a);
    return a;
  });
  var map={}; secs.forEach(function(s,i){ map[s.id]=links[i]; });
  var visible={};
  var io=new IntersectionObserver(function(es){
    es.forEach(function(e){ visible[e.target.id]=e.isIntersecting; });
    var current=null;                                 // topmost intersecting section, in document order
    for(var i=0;i<secs.length;i++){ if(visible[secs[i].id]){ current=secs[i].id; break; } }
    links.forEach(function(l){ l.classList.remove('active'); });
    if(current) map[current].classList.add('active');
  },{rootMargin:'-45% 0px -50% 0px',threshold:0});
  secs.forEach(function(s){ io.observe(s); });
  btn.addEventListener('click',function(){
    var open=nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', open?'true':'false');
  });
  nav.addEventListener('click',function(e){
    if(e.target.tagName==='A') nav.classList.remove('open');
  });
})();
</script>
</body>
</html>
